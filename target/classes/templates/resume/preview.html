<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>预览简历 - ResumeForge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="preview-bg">
<nav class="nav">
    <div class="brand">ResumeForge</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">控制台</a>
        <a th:href="@{/resume/edit}">继续编辑</a>
        <a class="btn small" th:href="@{/resume/download}">下载 PDF</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">退出</button>
        </form>
    </div>
</nav>
<main class="preview-wrap">
    <div class="preview-tips">
        <strong>简历预览</strong>
        <span>如果 PDF 中文显示异常，请确认系统存在微软雅黑 / 宋体 / Noto CJK 字体。</span>
    </div>
    <iframe class="preview-frame" th:srcdoc="${resumeHtml}"></iframe>
</main>
</body>
</html>
