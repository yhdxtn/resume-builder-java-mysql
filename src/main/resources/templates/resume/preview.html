<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" th:href="@{/manifest.webmanifest}">
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/careercraft-logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
    <title>预览简历 - 云简匠 CareerCraft</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="preview-bg">
<nav class="nav">
    <a class="brand" th:href="@{/}"><img class="brand-logo" th:src="@{/icons/careercraft-logo.svg}" alt="云简匠 Logo"><span>云简匠 CareerCraft</span></a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">控制台</a>
        <a th:href="@{/profile}">个人主页</a>
        <a th:href="@{/resume/my}">我的简历</a>
        <a th:href="@{/resume/edit}">继续编辑</a>
        <a class="btn small" th:if="${record != null}" th:href="@{/resume/download(recordId=${record.id})}">下载 PDF</a>
        <a class="btn small" th:if="${record == null}" th:href="@{/resume/download}">下载 PDF</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">退出</button>
        </form>
    </div>
</nav>
<main class="preview-wrap">
    <div class="preview-tips">
        <strong>简历预览</strong>
        <span>如果 PDF 中文显示异常，请确认系统存在微软雅黑 / 宋体 / Noto CJK 字体。</span>
    </div>
    <iframe class="preview-frame" th:srcdoc="${resumeHtml}"></iframe>
</main>
</body>
</html>
