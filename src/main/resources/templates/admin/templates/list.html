<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" th:href="@{/manifest.webmanifest}">
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/careercraft-logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
    <title>模板后台 - 云简匠 CareerCraft</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="nav">
    <a class="brand" th:href="@{/dashboard}"><img class="brand-logo" th:src="@{/icons/careercraft-logo.svg}" alt="云简匠 Logo"><span>云简匠后台</span></a>
    <div class="nav-links">
        <a th:href="@{/admin/users}">用户管理</a>
        <a th:href="@{/dashboard}">返回控制台</a>
        <a class="btn small" th:href="@{/admin/templates/new}">新增模板</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">退出</button>
        </form>
    </div>
</nav>
<main class="dashboard-wrap">
    <section class="panel">
        <div class="panel-head">
            <div>
                <h1>模板管理后台</h1>
                <p>每个模板都显示缩略预览，方便后台判断样式是否正确。</p>
            </div>
            <a class="btn" th:href="@{/admin/templates/new}">新增模板</a>
        </div>
        <div class="admin-template-grid">
            <div class="admin-template-card" th:each="tpl : ${templates}">
                <div class="tpl-shot admin-shot">
                    <iframe class="tpl-preview-frame" sandbox loading="lazy" th:attr="srcdoc=${templatePreviews[tpl.id]}"></iframe>
                </div>
                <div class="admin-template-meta">
                    <div class="meta-title-row">
                        <strong th:text="${tpl.name}">模板名</strong>
                        <span th:class="${tpl.active} ? 'status ok' : 'status off'" th:text="${tpl.active ? '启用' : '停用'}">启用</span>
                    </div>
                    <p class="muted" th:text="${tpl.description}">说明</p>
                    <div class="meta-line"><span>编码</span><code th:text="${tpl.templateKey}">modern</code></div>
                    <div class="meta-line"><span>主题色</span><b><span class="color-pill" th:style="'background:' + ${tpl.accentColor}"></span><span th:text="${tpl.accentColor}">#2563eb</span></b></div>
                    <div class="meta-line"><span>更新时间</span><span th:text="${#temporals.format(tpl.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span></div>
                    <div class="actions admin-actions">
                        <a class="btn tiny ghost" th:href="@{/admin/templates/{id}/edit(id=${tpl.id})}">编辑</a>
                        <form th:action="@{/admin/templates/{id}/toggle(id=${tpl.id})}" method="post" class="inline-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn tiny danger" type="submit" th:text="${tpl.active ? '停用' : '启用'}">停用</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
