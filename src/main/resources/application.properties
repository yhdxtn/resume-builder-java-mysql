spring.application.name=resume-builder
server.port=8080

# 先创建数据库：CREATE DATABASE resume_builder DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resume_builder?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 上传头像保存目录。可用环境变量 APP_UPLOAD_DIR 覆盖。
app.upload.dir=${APP_UPLOAD_DIR:uploads}
